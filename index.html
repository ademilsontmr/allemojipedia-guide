<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />

  <!-- Preconnect to critical domains -->
  <link rel="preconnect" href="https://pagead2.googlesyndication.com" />
  <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />

  <!-- Default meta tags - will be overridden by React Helmet on each page -->
  <title>Allemojipedia — Emoji Meanings, Names & Copy</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Allemojipedia — Emoji Meanings, Names & Copy" />
  <meta property="og:description"
    content="Your complete emoji encyclopedia. Find emoji meanings, copy and paste emojis, and learn how to use them." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://allemojipedia.com/" />
  <meta property="og:site_name" content="Allemojipedia" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Allemojipedia — Emoji Meanings, Names & Copy" />
  <meta name="twitter:description"
    content="Your complete emoji encyclopedia. Find emoji meanings, copy and paste emojis." />

  <!-- Critical CSS for initial render -->
  <style>
    #root {
      min-height: 100vh
    }

    .loading-skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }
  </style>

  <!-- Structured Data - WebSite + Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Allemojipedia",
      "alternateName": "All Emoji Pedia",
      "url": "https://allemojipedia.com/",
      "description": "Allemojipedia is a complete online encyclopedia of emojis, meanings, Unicode information, copy and paste emojis, and emoji usage guides.",
      "inLanguage": "en",
      "publisher": {
        "@type": "Organization",
        "name": "Allemojipedia",
        "url": "https://allemojipedia.com/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://allemojipedia.com/favicon.ico"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://allemojipedia.com/?s={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <!-- Structured Data - Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Allemojipedia",
      "url": "https://allemojipedia.com/",
      "sameAs": [],
      "description": "An online emoji encyclopedia providing meanings, Unicode data, copy and paste emojis, and emoji usage explanations."
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Google AdSense - Load after page content (non-blocking) -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var script = document.createElement('script');
        script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7369074864505211';
        script.async = true;
        script.crossOrigin = 'anonymous';
        document.head.appendChild(script);
      }, 2000);
    });
  </script>
</body>

</html>
