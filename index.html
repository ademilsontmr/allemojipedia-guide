<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />
    
    <!-- Default meta tags - will be overridden by React Helmet on each page -->
    <title>Allemojipedia — Emoji Meanings, Names & Copy</title>
    <meta name="author" content="Allemojipedia" />
    
    <!-- Critical CSS for initial render -->
    <style>
      #root{min-height:100vh}
      .loading-skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
      @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Google AdSense - Load after page content (non-blocking) -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var script = document.createElement('script');
          script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7369074864505211';
          script.async = true;
          script.crossOrigin = 'anonymous';
          document.head.appendChild(script);
        }, 2000);
      });
    </script>
  </body>
</html>
